<svg xmlns="http://www.w3.org/2000/svg" width="525" height="700" viewBox="0 0 1200 1600" role="img" aria-labelledby="tokki-positioning-poster-title tokki-positioning-poster-desc">
  <title id="tokki-positioning-poster-title">Tokki positioning poster</title>
  <desc id="tokki-positioning-poster-desc">A poster positioning Tokki as the local control layer for AI agent work. It shows public agent tools and LLM feedback feeding a Tokki formal model while private work, proof, routing, and watermarking stay inside a local boundary.</desc>
  <defs>
    <linearGradient id="tokki-ai-landscape-sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="tokki-ai-landscape-core" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
    <marker id="tokki-ai-landscape-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <marker id="tokki-ai-landscape-green-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="tokki-ai-landscape-blue-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .kicker { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 760; fill: #0f766e; letter-spacing: 0; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 76px; font-weight: 860; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; fill: #334155; letter-spacing: 0; }
      .section { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 820; fill: #0f172a; letter-spacing: 0; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 780; fill: #0f172a; letter-spacing: 0; }
      .body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; fill: #334155; letter-spacing: 0; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #475569; letter-spacing: 0; }
      .micro { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #64748b; letter-spacing: 0; }
      .footerLabel { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 780; fill: #0f172a; letter-spacing: 0; }
      .whiteTitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 44px; font-weight: 860; fill: #ffffff; letter-spacing: 0; }
      .whiteBody { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #dffdfa; letter-spacing: 0; }
      .whiteSmall { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #ecfeff; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .softPanel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .privatePanel { fill: #fff7ed; stroke: #d97706; stroke-width: 2.2; }
      .agentPanel { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.2; }
      .modelPanel { fill: #ecfdf5; stroke: #059669; stroke-width: 2.2; }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; }
      .greenPill { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; }
      .bluePill { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
      .amberPill { fill: #fff7ed; stroke: #d97706; stroke-width: 1.8; }
      .ossPill { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.8; }
      .boundary { fill: none; stroke: #0f766e; stroke-width: 7; stroke-dasharray: 20 16; }
      .line { fill: none; stroke: #0f172a; stroke-width: 4; marker-end: url(#tokki-ai-landscape-arrow); }
      .greenLine { fill: none; stroke: #059669; stroke-width: 4; marker-end: url(#tokki-ai-landscape-green-arrow); }
      .blueLine { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#tokki-ai-landscape-blue-arrow); }
      .softLine { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#tokki-ai-landscape-arrow); }
    </style>
  </defs>

  <rect width="1200" height="1600" fill="url(#tokki-ai-landscape-sky)"/>
  <rect x="42" y="42" width="1116" height="1516" rx="34" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="90" y="118" class="kicker">Agent tools already have builders and runners.</text>
  <text x="90" y="202" class="title">Tokki builds the</text>
  <text x="90" y="288" class="title">formal control layer.</text>
  <text x="94" y="342" class="subtitle">The LLM helps shape it.</text>
  <text x="94" y="382" class="subtitle">Tokki keeps proof local.</text>

  <g aria-label="public agent landscape">
    <rect x="94" y="426" width="1012" height="132" rx="28" class="softPanel"/>
    <text x="128" y="478" class="section">Agent builders and runners</text>
    <rect x="130" y="506" width="126" height="34" rx="17" class="pill"/>
    <text x="193" y="529" text-anchor="middle" class="small">Models</text>
    <rect x="276" y="506" width="146" height="34" rx="17" class="pill"/>
    <text x="349" y="529" text-anchor="middle" class="small">Agent IDEs</text>
    <rect x="442" y="506" width="156" height="34" rx="17" class="pill"/>
    <text x="520" y="529" text-anchor="middle" class="small">Frameworks</text>
    <rect x="618" y="506" width="160" height="34" rx="17" class="pill"/>
    <text x="698" y="529" text-anchor="middle" class="small">App builders</text>
    <rect x="798" y="506" width="134" height="34" rx="17" class="pill"/>
    <text x="865" y="529" text-anchor="middle" class="small">Protocols</text>
    <rect x="952" y="506" width="118" height="34" rx="17" class="pill"/>
    <text x="1011" y="529" text-anchor="middle" class="small">Ops</text>
  </g>

  <text x="600" y="624" text-anchor="middle" class="section">Operations layer</text>
  <text x="600" y="664" text-anchor="middle" class="subtitle">local formal model of agent work</text>
  <text x="600" y="704" text-anchor="middle" class="body">LLM output is useful, not trusted raw.</text>

  <rect x="86" y="730" width="1028" height="532" rx="40" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M 118 990 C 210 800 395 722 600 734 C 804 746 996 838 1080 990 C 994 1146 805 1226 600 1218 C 394 1210 208 1136 118 990 Z" class="boundary"/>
  <text x="600" y="765" text-anchor="middle" class="micro">private boundary</text>

  <g aria-label="private work vault">
    <rect x="118" y="835" width="250" height="290" rx="28" class="privatePanel"/>
    <path d="M 190 928 v-44 c 0 -42 34 -76 76 -76 s 76 34 76 76 v44" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
    <rect x="168" y="914" width="156" height="112" rx="22" fill="#ffffff" stroke="#0f172a" stroke-width="5"/>
    <circle cx="246" cy="968" r="16" fill="#d97706"/>
    <path d="M 246 984 v28" stroke="#d97706" stroke-width="8" stroke-linecap="round"/>
    <text x="243" y="1074" text-anchor="middle" class="label">Private Work</text>
    <text x="243" y="1104" text-anchor="middle" class="small">repo, logs, rules</text>
  </g>

  <g aria-label="tokki formal model core">
    <path d="M 600 798 L 790 908 L 790 1128 L 600 1238 L 410 1128 L 410 908 Z" fill="url(#tokki-ai-landscape-core)" stroke="#0f172a" stroke-width="4"/>
    <circle cx="600" cy="1018" r="160" fill="#0f766e" stroke="#ccfbf1" stroke-width="8"/>
    <circle cx="600" cy="1018" r="108" fill="#115e59" stroke="#99f6e4" stroke-width="5"/>
    <circle cx="600" cy="1018" r="56" fill="#ffffff"/>
    <text x="600" y="906" text-anchor="middle" class="whiteTitle">Tokki</text>
    <text x="600" y="1012" text-anchor="middle" class="label">formal</text>
    <text x="600" y="1042" text-anchor="middle" class="label">model</text>
    <rect x="466" y="837" width="122" height="38" rx="19" fill="#ffffff" opacity="0.97"/>
    <text x="527" y="862" text-anchor="middle" class="small">map</text>
    <rect x="612" y="837" width="122" height="38" rx="19" fill="#ffffff" opacity="0.97"/>
    <text x="673" y="862" text-anchor="middle" class="small">rules</text>
    <rect x="456" y="1163" width="140" height="38" rx="19" fill="#ffffff" opacity="0.97"/>
    <text x="526" y="1188" text-anchor="middle" class="small">proof</text>
    <rect x="604" y="1163" width="140" height="38" rx="19" fill="#ffffff" opacity="0.97"/>
    <text x="674" y="1188" text-anchor="middle" class="small">routes</text>
  </g>

  <g aria-label="agent tools and llm">
    <rect x="832" y="815" width="240" height="258" rx="30" class="agentPanel"/>
    <path d="M 918 910 C 918 876 946 848 980 848 C 1006 848 1028 864 1038 888 C 1072 892 1098 920 1098 954 C 1098 992 1068 1020 1028 1020 H 906 C 870 1020 842 994 842 960 C 842 928 866 904 898 900 C 902 900 910 902 918 910 Z" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
    <text x="970" y="944" text-anchor="middle" class="section">LLM</text>
    <text x="970" y="979" text-anchor="middle" class="small">agent tools</text>
    <circle cx="860" cy="844" r="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="1064" cy="852" r="14" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="1044" cy="1088" r="13" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  </g>

  <path d="M 368 986 C 382 986 394 986 400 986 L 410 986" class="line"/>
  <path d="M 790 986 C 806 986 818 986 822 986 L 832 986" class="greenLine"/>
  <path d="M 872 1088 C 812 1168 734 1214 652 1226 L 642 1228" class="blueLine"/>
  <path d="M 438 1134 C 388 1146 342 1146 312 1132 L 302 1130" class="softLine"/>

  <g aria-label="loop labels">
    <rect x="380" y="920" width="170" height="42" rx="21" class="amberPill"/>
    <text x="465" y="948" text-anchor="middle" class="small">selected facts</text>
    <rect x="660" y="920" width="168" height="42" rx="21" class="greenPill"/>
    <text x="744" y="948" text-anchor="middle" class="small">safe context</text>
    <rect x="708" y="1120" width="190" height="42" rx="21" class="bluePill"/>
    <text x="803" y="1148" text-anchor="middle" class="small">LLM feedback</text>
    <rect x="278" y="1160" width="168" height="42" rx="21" class="pill"/>
    <text x="362" y="1188" text-anchor="middle" class="small">audit trail</text>
  </g>

  <g aria-label="formal model outputs">
    <text x="492" y="1336" text-anchor="middle" class="section">LLM assists</text>
    <text x="714" y="1336" text-anchor="middle" class="section">Tokki owns</text>
    <rect x="178" y="1384" width="200" height="52" rx="26" class="greenPill"/>
    <text x="278" y="1417" text-anchor="middle" class="label">Rules</text>
    <rect x="404" y="1384" width="200" height="52" rx="26" class="greenPill"/>
    <text x="504" y="1417" text-anchor="middle" class="label">Proof</text>
    <rect x="630" y="1384" width="200" height="52" rx="26" class="greenPill"/>
    <text x="730" y="1417" text-anchor="middle" class="label">Routes</text>
    <rect x="856" y="1384" width="200" height="52" rx="26" class="greenPill"/>
    <text x="956" y="1417" text-anchor="middle" class="label">Watermark</text>
  </g>

  <rect x="58" y="1484" width="100" height="48" rx="24" class="greenPill"/>
  <text x="108" y="1515" text-anchor="middle" class="footerLabel">Tokki</text>
  <path d="M 176 1508 L 196 1508" class="greenLine"/>
  <rect x="214" y="1484" width="146" height="48" rx="24" class="bluePill"/>
  <text x="287" y="1515" text-anchor="middle" class="footerLabel">Claude Code</text>
  <rect x="372" y="1484" width="164" height="48" rx="24" class="bluePill"/>
  <text x="454" y="1515" text-anchor="middle" class="footerLabel">OpenAI Codex</text>
  <rect x="548" y="1484" width="198" height="48" rx="24" class="bluePill"/>
  <text x="647" y="1515" text-anchor="middle" class="footerLabel">Google Antigravity</text>
  <rect x="758" y="1484" width="82" height="48" rx="24" class="ossPill"/>
  <text x="799" y="1515" text-anchor="middle" class="footerLabel">Aider</text>
  <rect x="852" y="1484" width="116" height="48" rx="24" class="ossPill"/>
  <text x="910" y="1515" text-anchor="middle" class="footerLabel">OpenCode</text>
  <path d="M 986 1508 L 1018 1508" class="greenLine"/>
  <rect x="1036" y="1484" width="86" height="48" rx="24" class="greenPill"/>
  <text x="1079" y="1515" text-anchor="middle" class="footerLabel">Proof</text>
</svg>
